server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: orderly
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/orderly}
    username: ${SPRING_DATASOURCE_USERNAME:orderly}
    password: ${SPRING_DATASOURCE_PASSWORD:orderly}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000}
  jwt:
    secret: ${JWT_SECRET:dGhpcyBpcyBhIHNlY3JldCBrZXkgZm9yIGRldmVsb3BtZW50IG9ubHk=}
    expiration-ms: 86400000
